name: Strava Auto Kudos
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-kudos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run script
        env:
          STRAVA_COOKIE: ${{ secrets.STRAVA_COOKIE }}
        # Poprawiona nazwa pliku:
        run: python give_kudos.py
