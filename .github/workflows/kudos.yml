name: Strava Auto Kudos
on:
  schedule:
    - cron: '0 * * * *'  # Uruchamiaj co pełną godzinę
  workflow_dispatch:      # Pozwala Ci klikać przycisk "Run workflow" ręcznie

jobs:
  run-kudos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install requests
        run: pip install requests

      - name: Run script
        env:
          STRAVA_COOKIE: ${{ secrets.STRAVA_COOKIE }}
        run: python kudos.py
